<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikTok Manager</title>
  <style>
    :root {
      --primary: #FE2C55;
      --primary-dark: #d91f44;
      --dark: #010101;
      --bg: #f5f5f7;
      --card: #ffffff;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --border: #e0e0e0;
      --radius: 14px;
      --shadow: 0 4px 20px rgba(0,0,0,0.06);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Login */
    #login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 48px 40px;
      text-align: center;
      box-shadow: var(--shadow);
      max-width: 600px;
      width: 90%;
    }
    .tiktok-logo {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      margin-bottom: 20px;
    }
    .tiktok-logo-text {
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: -1px;
      color: var(--dark);
    }
    .tiktok-logo-text span { color: var(--primary); }
    .login-card h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    .login-card p { color: var(--muted); font-size: 0.95rem; margin-bottom: 28px; }
    .error-msg { color: #c00; font-size: 0.85rem; margin-bottom: 12px; }
    .btn-tiktok {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px 22px;
      background: var(--dark);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
      font-family: inherit;
    }
    .btn-tiktok:hover { opacity: 0.85; }
    .btn-tiktok-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    /* Dashboard */
    #dashboard { display: none; }
    .header {
      background: var(--dark);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand {
      font-size: 1.1rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .brand span { color: var(--primary); }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--primary);
    }
    .avatar-initial {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .username { font-weight: 600; font-size: 0.95rem; color: #fff; }

    /* Main layout */
    .main {
      max-width: 600px;
      margin: 0 auto;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Card */
    .card { background: var(--card); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
    .card-title { font-size: 1rem; font-weight: 700; margin-bottom: 18px; }

    /* Form */
    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.03em;
    }
    input[type="url"], textarea, select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      color: var(--text);
      background: var(--bg);
      transition: border-color 0.15s;
      font-family: inherit;
    }
    input[type="url"]:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--primary);
    }
    textarea { resize: vertical; min-height: 88px; }
    .counter { font-size: 0.78rem; color: var(--muted); text-align: right; margin-top: 4px; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 11px 22px; border-radius: 10px;
      font-size: 0.95rem; font-weight: 600;
      cursor: pointer; border: none;
      transition: transform 0.1s, opacity 0.15s;
      text-decoration: none;
      font-family: inherit;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--primary); color: #fff; width: 100%; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
    .btn-ghost {
      background: transparent; color: var(--muted);
      border: 1.5px solid var(--border);
      padding: 7px 14px; font-size: 0.85rem;
    }
    .btn-ghost:hover { border-color: var(--primary); color: var(--primary); }
    .btn-ghost-white {
      background: transparent; color: rgba(255,255,255,0.75);
      border: 1.5px solid rgba(255,255,255,0.25);
      padding: 7px 14px; font-size: 0.85rem;
    }
    .btn-ghost-white:hover { border-color: #fff; color: #fff; }
    .btn-sm { padding: 6px 14px; font-size: 0.82rem; border-radius: 8px; }

    /* Status alert */
    .alert {
      padding: 12px 16px; border-radius: 10px;
      font-size: 0.9rem; margin-bottom: 16px;
    }
    .alert-success { background: #d1fae5; color: #065f46; }
    .alert-error   { background: #fee2e2; color: #991b1b; }
    .hidden { display: none !important; }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th {
      text-align: left; padding: 8px 12px;
      font-size: 0.78rem; font-weight: 600; color: var(--muted);
      border-bottom: 2px solid var(--border); letter-spacing: 0.04em;
    }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    .caption-cell {
      max-width: 180px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* Badge */
    .badge {
      display: inline-block; padding: 3px 10px;
      border-radius: 100px; font-size: 0.78rem; font-weight: 600;
    }
    .badge-pending    { background: #fef9c3; color: #713f12; }
    .badge-processing { background: #e0f2fe; color: #075985; }
    .badge-success, .badge-publish_complete { background: #dcfce7; color: #14532d; }
    .badge-failed     { background: #fee2e2; color: #7f1d1d; }

    /* Spinner */
    .spin {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: rotate 0.5s linear infinite;
    }
    .spin-dark {
      border-color: rgba(0,0,0,0.15);
      border-top-color: var(--text);
    }
    @keyframes rotate { to { transform: rotate(360deg); } }

    /* Toast */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 1000;
    }
    .toast {
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      box-shadow: 0 6px 24px rgba(0,0,0,0.15);
      max-width: 320px;
      animation: slideIn 0.2s ease;
    }
    .toast-success { background: var(--dark); color: #fff; }
    .toast-error   { background: var(--primary); color: #fff; }
    @keyframes slideIn {
      from { transform: translateY(16px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .row-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .empty-row td { text-align: center; color: var(--muted); padding: 28px 12px; }

    @media (max-width: 560px) {
      .login-card { padding: 36px 24px; }
      .main { padding: 20px 14px; }
      .card { padding: 18px; }
      .header { padding: 12px 16px; }
      #toast-container { right: 12px; bottom: 12px; left: 12px; }
      .toast { max-width: 100%; }
    }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-page">
  <div class="login-card">
    <div class="tiktok-logo">
      <div class="tiktok-logo-text">Tik<span>Tok</span></div>
    </div>
    <h1>TikTok Manager</h1>
    <p>GCS公開URLからTikTokへ動画を自動投稿</p>
    <div id="login-error" class="error-msg hidden"></div>
    <a href="/auth/tiktok" class="btn-tiktok">
      <svg class="btn-tiktok-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.79a8.18 8.18 0 0 0 4.78 1.52V6.85a4.85 4.85 0 0 1-1.01-.16z" fill="#fff"/>
      </svg>
      TikTokでログイン
    </a>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="header">
    <div class="brand">Tik<span>Tok</span> Manager</div>
    <div class="user-info">
      <div id="avatar-wrap"></div>
      <span id="username" class="username"></span>
      <button class="btn btn-ghost-white btn-sm" id="logout-btn">ログアウト</button>
    </div>
  </div>

  <div class="main">
    <!-- Post form -->
    <div class="card">
      <div class="card-title">動画を投稿</div>
      <div id="post-alert" class="hidden"></div>
      <form id="publish-form">
        <div class="field">
          <label for="video-url">GCS 動画 URL <span style="color:var(--primary)">*</span></label>
          <input type="url" id="video-url" placeholder="https://storage.googleapis.com/bucket/video.mp4" required>
        </div>
        <div class="field">
          <label for="caption">キャプション</label>
          <textarea id="caption" placeholder="動画の説明を入力... #ハッシュタグ" maxlength="2200"></textarea>
          <div class="counter"><span id="char-count">0</span> / 2200</div>
        </div>
        <div class="field">
          <label for="privacy">公開範囲</label>
          <select id="privacy">
            <option value="PUBLIC_TO_EVERYONE">全体公開</option>
            <option value="FOLLOWER_OF_CREATOR">フォロワーのみ</option>
            <option value="SELF_ONLY">自分のみ（非公開）</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary" id="submit-btn">投稿する</button>
      </form>

      <div id="publish-status" class="hidden" style="margin-top:16px">
        <div class="alert alert-success" id="publish-result"></div>
      </div>
    </div>

    <!-- History -->
    <div class="card">
      <div class="row-header">
        <div class="card-title" style="margin:0">投稿履歴</div>
        <button class="btn btn-ghost btn-sm" id="refresh-btn" onclick="loadVideos()">更新</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>日時</th>
              <th>キャプション</th>
              <th>ステータス</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="videos-tbody">
            <tr class="empty-row"><td colspan="4"><span class="spin spin-dark"></span></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script>
  const loginPage  = document.getElementById('login-page');
  const dashboard  = document.getElementById('dashboard');

  // Init
  (async () => {
    const params = new URLSearchParams(location.search);
    if (params.get('error')) {
      const el = document.getElementById('login-error');
      el.textContent = `ログインに失敗しました: ${params.get('error')}`;
      el.classList.remove('hidden');
      history.replaceState({}, '', '/');
    }

    try {
      const res = await fetch('/auth/me');
      if (res.ok) {
        showDashboard(await res.json());
      } else {
        showLogin();
      }
    } catch {
      showLogin();
    }
  })();

  function showLogin() {
    loginPage.style.display = 'flex';
    dashboard.style.display = 'none';
  }

  function showDashboard(user) {
    loginPage.style.display = 'none';
    dashboard.style.display = 'block';

    document.getElementById('username').textContent = user.display_name || 'TikTokユーザー';

    const wrap = document.getElementById('avatar-wrap');
    wrap.innerHTML = '';
    if (user.avatar_url) {
      const img = document.createElement('img');
      img.src = user.avatar_url;
      img.alt = 'avatar';
      img.className = 'avatar';
      img.onerror = () => { img.replaceWith(makeInitial(user)); };
      wrap.appendChild(img);
    } else {
      wrap.appendChild(makeInitial(user));
    }

    loadVideos();
  }

  function makeInitial(user) {
    const el = document.createElement('div');
    el.className = 'avatar-initial';
    el.textContent = (user.display_name || 'T')[0].toUpperCase();
    return el;
  }

  // Logout
  document.getElementById('logout-btn').addEventListener('click', async () => {
    await fetch('/auth/logout', { method: 'POST' });
    document.getElementById('avatar-wrap').innerHTML = '';
    showLogin();
  });

  // Caption counter
  const captionEl   = document.getElementById('caption');
  const charCountEl = document.getElementById('char-count');
  captionEl.addEventListener('input', () => {
    charCountEl.textContent = captionEl.value.length;
  });

  // Publish form
  document.getElementById('publish-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn      = document.getElementById('submit-btn');
    const statusEl = document.getElementById('publish-status');
    const resultEl = document.getElementById('publish-result');

    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span> 投稿中...';
    statusEl.classList.add('hidden');

    try {
      const res = await fetch('/api/videos/publish', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          video_url: document.getElementById('video-url').value,
          caption:   captionEl.value,
          privacy:   document.getElementById('privacy').value,
        }),
      });

      if (res.ok) {
        const data = await res.json();
        resultEl.className = 'alert alert-success';
        resultEl.textContent = `投稿を送信しました。Publish ID: ${data.publish_id}`;
        statusEl.classList.remove('hidden');
        toast('success', '投稿リクエストを送信しました');
        e.target.reset();
        charCountEl.textContent = '0';
        loadVideos();
      } else {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        resultEl.className = 'alert alert-error';
        resultEl.textContent = `エラー: ${err.detail || '不明なエラー'}`;
        statusEl.classList.remove('hidden');
        toast('error', `投稿に失敗しました: ${err.detail || '不明なエラー'}`);
      }
    } catch (err) {
      toast('error', `ネットワークエラー: ${err.message}`);
    } finally {
      btn.disabled = false;
      btn.textContent = '投稿する';
    }
  });

  // Video list
  async function loadVideos() {
    const tbody    = document.getElementById('videos-tbody');
    const refreshBtn = document.getElementById('refresh-btn');
    tbody.innerHTML = '<tr class="empty-row"><td colspan="4"><span class="spin spin-dark"></span></td></tr>';
    if (refreshBtn) { refreshBtn.disabled = true; refreshBtn.textContent = '読み込み中...'; }

    try {
      const res = await fetch('/api/videos/list');
      if (!res.ok) {
        tbody.innerHTML = emptyRow('データを取得できませんでした');
        return;
      }
      const videos = await res.json();
      if (!videos.length) {
        tbody.innerHTML = emptyRow('投稿履歴がありません');
        return;
      }
      tbody.innerHTML = videos.map(v => `
        <tr>
          <td style="white-space:nowrap">${fmtDate(v.created_at)}</td>
          <td class="caption-cell" title="${esc(v.caption)}">${esc(v.caption || '—')}</td>
          <td>${badge(v.status)}</td>
          <td>${v.publish_id
            ? `<button class="btn btn-ghost btn-sm" onclick="refreshStatus('${esc(v.publish_id)}')">更新</button>`
            : ''}</td>
        </tr>
      `).join('');
    } catch (err) {
      tbody.innerHTML = emptyRow(`エラー: ${err.message}`);
    } finally {
      if (refreshBtn) { refreshBtn.disabled = false; refreshBtn.textContent = '更新'; }
    }
  }

  async function refreshStatus(publishId) {
    try {
      await fetch(`/api/videos/status/${encodeURIComponent(publishId)}`);
      await loadVideos();
      toast('success', 'ステータスを更新しました');
    } catch {
      toast('error', 'ステータス更新に失敗しました');
    }
  }

  function badge(status) {
    const labels = {
      pending:          ['pending',    '待機中'],
      processing:       ['processing', '処理中'],
      success:          ['success',    '成功'],
      publish_complete: ['publish_complete', '投稿完了'],
      failed:           ['failed',     '失敗'],
    };
    const [cls, label] = labels[status] || ['pending', status || '不明'];
    return `<span class="badge badge-${cls}">${label}</span>`;
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleString('ja-JP', {
      month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit',
    });
  }

  function esc(s) {
    return String(s ?? '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function emptyRow(msg) {
    return `<tr class="empty-row"><td colspan="4">${esc(msg)}</td></tr>`;
  }

  // Toast notifications
  function toast(type, msg) {
    const container = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.textContent = msg;
    container.appendChild(el);
    setTimeout(() => {
      el.style.transition = 'opacity 0.3s';
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 300);
    }, 3500);
  }
</script>
</body>
</html>
