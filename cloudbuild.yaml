steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/tiktok-manager:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/tiktok-manager:latest'
      - '.'
    dir: 'tiktok-manager'

  # Step 2: Push Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/tiktok-manager:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/tiktok-manager:latest'

  # Step 3: Deploy to Cloud Run with 100% traffic to latest revision
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'tiktok-manager'
      - '--image'
      - 'gcr.io/$PROJECT_ID/tiktok-manager:$COMMIT_SHA'
      - '--region'
      - 'asia-northeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--traffic=100'

images:
  - 'gcr.io/$PROJECT_ID/tiktok-manager:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/tiktok-manager:latest'

options:
  logging: CLOUD_LOGGING_ONLY
